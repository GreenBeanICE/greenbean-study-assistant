name: Quality Check

on:
  push:
    branches:
      - main
  pull_request:
      branches:
      - main

jobs:
  quality:
    name: Test Coverage and SonarQube Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage #前端测试
        run: npm run test:frontend:coverage

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend-python/requirements-dev.txt

      - name: Install Python test dependencies
        run: python -m pip install -r backend-python/requirements-dev.txt

      - name: Run Python tests with coverage #Python测试
        run: |
          mkdir -p coverage/python
          cd backend-python
          python -m pytest --cov=app --cov-report=term-missing --cov-report=xml:../coverage/python/coverage.xml

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9180ba819ebd9a5f78ccc0e64cb6b06f5917fdff

      - name: Run Rust tests with coverage #Rust测试
        run: |
          mkdir -p coverage/rust
          cd src-tauri
          cargo llvm-cov --lcov --output-path ../coverage/rust/lcov.info

      - name: SonarQube Cloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
