name: Quality Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-tests:
    name: Frontend Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:frontend:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend/lcov.info
          if-no-files-found: error

  python-tests:
    name: Python Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend-python/requirements.txt
            backend-python/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install -r backend-python/requirements.txt
          python -m pip install -r backend-python/requirements-dev.txt

      - name: Run Python tests with coverage
        run: |
          mkdir -p coverage/python
          cd backend-python
          python -m pytest --cov=app --cov-report=term-missing --cov-report=xml:../coverage/python/coverage.xml

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage/python/coverage.xml
          if-no-files-found: error

  rust-tests:
    name: Rust Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9180ba819ebd9a5f78ccc0e64cb6b06f5917fdff

      - name: Run Rust tests with coverage
        run: |
          mkdir -p coverage/rust
          cd src-tauri
          cargo llvm-cov --lcov --output-path ../coverage/rust/lcov.info

      - name: Upload Rust coverage
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage/rust/lcov.info
          if-no-files-found: error

  sonar:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest
    needs:
      - frontend-tests
      - python-tests
      - rust-tests
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend

      - name: Download Python coverage
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: coverage/python

      - name: Download Rust coverage
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: coverage/rust

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
