sonar.projectKey=GreenBeanICE_greenbean-study-assistant
sonar.organization=greenbeanice

sonar.projectName=Greenbean Study Assistant
sonar.projectVersion=0.1.0

sonar.sources=src,src-tauri/src,backend-python/app
sonar.tests=src,src-tauri/tests,tests,backend-python/tests

sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  dist-ssr/**,\
  src-tauri/target/**,\
  backend-python/.venv/**,\
  backend-python/**/__pycache__/**,\
  coverage/**,\
  src/components/ui/**,\
  **/*.d.ts,\
  **/.gitkeep

sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  tests/**/*.ts,\
  tests/**/*.tsx,\
  tests/**/*.rs,\
  **/tests/**/*.rs

sonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info
sonar.typescript.lcov.reportPaths=coverage/frontend/lcov.info
sonar.rust.lcov.reportPaths=coverage/rust/lcov.info
sonar.python.coverage.reportPaths=coverage/python/coverage.xml

sonar.sourceEncoding=UTF-8
